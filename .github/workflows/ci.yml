name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: equipment_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Stáhnutí kódu z repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Nastavení práv pro Maven Wrapper
        run: chmod +x mvnw

      - name: Build a spuštění testů (Maven)
        env:
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: ./mvnw -B clean verify

      - name: Statická analýza kódu (PMD)
        run: ./mvnw pmd:check

      - name: Nahrání testovacích reportů
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Nahrání Code Coverage reportu (JaCoCo)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Přihlášení do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sestavení a publikace Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy-staging:
    name: CD - Nasazení do Staging prostředí
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Stáhnutí kódu z repozitáře
        uses: actions/checkout@v4

      - name: Vytvoření lokálního K8s clusteru (KinD)
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kind-cluster

      - name: Vytvoření prostředí (Namespaces)
        run: |
          kubectl create namespace staging
          kubectl create namespace production

      - name: Bezpečné vytvoření K8s Secret pro databázi
        run: |
          kubectl create secret generic db-credentials \
            --from-literal=username=${{ secrets.DB_USER }} \
            --from-literal=password=${{ secrets.DB_PASSWORD }} \
            -n staging

      - name: Nasazení databáze do Stagingu
        run: kubectl apply -f k8s/postgres.yaml -n staging

      - name: Nasazení aplikace do Stagingu
        run: kubectl apply -f k8s/deployment.yaml -n staging

      - name: Závěrečný test (Ověření, že se pody úspěšně spustily)
        run: |
          echo "Čekám na spuštění databáze..."
          kubectl rollout status deployment/postgres-db -n staging --timeout=90s
          
          echo "Čekám na spuštění aplikace..."
          kubectl rollout status deployment/equipment-app -n staging --timeout=120s
          
          echo "Výpis běžících kontejnerů:"
          kubectl get pods -n staging