name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhnutí kódu z repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build a spuštění testů (Maven)
        run: ./mvnw -B clean verify