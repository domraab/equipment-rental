name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhnutí kódu z repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Nastavení práv pro Maven Wrapper
        run: chmod +x mvnw

      - name: Build a spuštění testů (Maven)
        run: ./mvnw -B clean verify

      - name: Statická analýza kódu (PMD)
        run: ./mvnw pmd:check

      - name: Nahrání testovacích reportů
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Nahrání Code Coverage reportu (JaCoCo)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Přihlášení do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sestavení a publikace Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest