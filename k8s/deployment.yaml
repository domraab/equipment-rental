apiVersion: apps/v1
kind: Deployment
metadata:
  name: equipment-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: equipment-app
  template:
    metadata:
      labels:
        app: equipment-app
    spec:
      containers:
        - name: equipment-app
          image: ghcr.io/domraab/equipment-rental:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: equipment-service
spec:
  selector:
    app: equipment-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP